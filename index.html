<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1B5E20">
  <title>임지윤 | 꿀잼영어 선생님</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
</head>
<body>
  <div class="card-container">
    <div class="business-card">
      <div class="card-top">
        <div class="avatar-wrapper">
          <div class="logo-ring">
            <img src="logo.png" alt="재미있고 쓸모있는 꿀잼영어" class="logo" decoding="async">
          </div>
        </div>
        <div class="header-text">
          <h1 class="name">임지윤</h1>
          <p class="job">꿀잼영어 선생님</p>
          <p class="tagline">재미있고 쓸모있는 꿀잼영어</p>
        </div>
      </div>

      <div class="info-section">
        <div class="contact-list">
          <a href="mailto:faithful0@naver.com" class="contact-item">
            <span class="icon">✉</span>
            <span>faithful0@naver.com</span>
          </a>
          <a href="tel:010-4701-3152" class="contact-item">
            <span class="icon">📞</span>
            <span>010-4701-3152</span>
          </a>
          <a href="#" class="contact-item contact-item--kakao" id="contact-kakao" target="_blank" rel="noopener noreferrer" hidden></a>
          <div class="contact-item address">
            <span class="icon">📍</span>
            <span>부천시 성주로 200번길 21 2층 꿀잼영어</span>
          </div>
        </div>

        <div class="map-qr-row">
          <div class="map-wrapper">
            <div id="naver-map"></div>
          </div>
          <div class="qr-section">
            <p class="qr-label">꿀잼영어 홈페이지</p>
            <div id="qr-code" class="qr-code" aria-label="꿀잼영어 홈페이지로 연결되는 QR 코드"></div>
            <p class="qr-hint">스캔 시 홈페이지로 이동</p>
            <button type="button" class="copy-link-btn" id="copy-home-link">링크 복사</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin referrerpolicy="no-referrer"></script>
  <script src="map.js"></script>
  <script src="script.js"></script>
</body>
</html>
